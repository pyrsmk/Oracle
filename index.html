<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Oracle Céleste</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --gold: #c9a96e;
    --gold-dim: #b08d57;
    --gold-glow: rgba(201, 169, 110, 0.25);
    --violet: #7c5cbf;
    --violet-dim: rgba(124, 92, 191, 0.15);
    --bg: #09060f;
    --bg2: #110d1f;
    --text: #e8dfc8;
    --text-dim: #9e8fa0;
    --text-muted: #5e5568;
    --border: rgba(201, 169, 110, 0.18);
    --border-violet: rgba(124, 92, 191, 0.28);
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow-x: hidden;
    cursor: default;
  }

  #canvas-stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .ambient {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 60% 40% at 25% 15%, rgba(124,92,191,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 75% 85%, rgba(201,169,110,0.08) 0%, transparent 70%);
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4rem 1.5rem 5rem;
  }

  .container {
    width: 100%;
    max-width: 580px;
  }

  .header {
    text-align: center;
    margin-bottom: 3.5rem;
  }

  .eye-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
    animation: eye-pulse 4s ease-in-out infinite;
  }

  @keyframes eye-pulse {
    0%, 100% {
      filter: drop-shadow(0 0 10px rgba(201,169,110,0.3));
    }
    50% {
      filter: drop-shadow(0 0 28px rgba(201,169,110,0.6)) drop-shadow(0 0 50px rgba(124,92,191,0.3));
    }
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.3rem, 4.5vw, 1.9rem);
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 0.14em;
    line-height: 1.3;
    margin-bottom: 0.7rem;
  }

  .tagline {
    font-style: italic;
    font-size: 1.05rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  #result-panel {
    display: none;
    flex-direction: column;
    gap: 1.5rem;
    animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  #result-panel.show {
    display: flex;
  }

  .sep {
    display: flex;
    align-items: center;
    gap: 1rem;
    color: var(--gold-dim);
    font-size: 0.75rem;
    letter-spacing: 0.3em;
  }
  .sep::before, .sep::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  }

  .glass-panel {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    background: rgba(255,255,255,0.025);
    border: 0.5px solid var(--border);
    border-radius: 18px;
    padding: 2.2rem;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  label {
    display: block;
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 0.65rem;
  }

  label .optional {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    text-transform: none;
    font-style: italic;
    opacity: 0.55;
  }

  input[type="text"],
  input[type="date"],
  input[type="time"] {
    width: 100%;
    padding: 0.8rem 1.1rem;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    outline: none;
    transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus,
  input[type="date"]:focus,
  input[type="time"]:focus {
    border-color: var(--gold-dim);
    background: rgba(201,169,110,0.06);
    box-shadow: 0 0 0 3px rgba(201,169,110,0.08);
  }

  input[type="date"]::-webkit-calendar-picker-indicator,
  input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(0.6) sepia(0.8) hue-rotate(345deg) brightness(1.1);
    cursor: pointer;
    opacity: 0.8;
  }

  input[type="date"]::-webkit-inner-spin-button,
  input[type="time"]::-webkit-inner-spin-button {
    display: none;
  }

  .btn-oracle {
    display: block;
    width: 100%;
    padding: 1.05rem 1rem;
    background: linear-gradient(135deg, #c9a96e 0%, #7c5cbf 100%);
    border: none;
    border-radius: 10px;
    color: #0d0a18;
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: opacity 0.25s, transform 0.2s, box-shadow 0.3s;
    box-shadow: 0 4px 24px rgba(124,92,191,0.25);
  }

  .btn-oracle:hover:not(:disabled) {
    opacity: 0.93;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(124,92,191,0.4);
  }

  .btn-oracle:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn-oracle:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .btn-oracle .shimmer {
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
    animation: shimmer 2.5s ease-in-out infinite;
  }

  @keyframes shimmer {
    100% {
      left: 100%;
    }
  }

  @keyframes rise {
    from {
      opacity: 0;
      transform: translateY(24px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .sigils {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.9rem;
  }

  .sigil {
    background: rgba(255,255,255,0.03);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 1.3rem 0.6rem 1rem;
    text-align: center;
    transition: border-color 0.3s;
  }

  .sigil:hover {
    border-color: rgba(201,169,110,0.35);
  }

  .sigil-icon {
    font-size: 2rem;
    display: block;
    margin-bottom: 0.55rem;
    line-height: 1;
  }

  .sigil-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.48rem;
    letter-spacing: 0.18em;
    color: var(--gold-dim);
    text-transform: uppercase;
  }

  .sigil-value {
    font-size: 1rem;
    color: var(--text);
    font-style: italic;
  }

  .sigil-sub {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
  }

  .prophecy-wrap {
    background: rgba(124,92,191,0.06);
    border: 0.5px solid var(--border-violet);
    border-radius: 18px;
    padding: 2.2rem;
    position: relative;
    overflow: hidden;
  }

  .prophecy-wrap::before {
    content: '';
    position: absolute;
    top: 0;
    left: 10%;
    right: 10%;
    height: 0.5px;
    background: linear-gradient(to right, transparent, rgba(124,92,191,0.5), transparent);
  }

  .synthese {
    font-size: 1.1rem;
    line-height: 1.85;
    color: #d4c9b8;
    font-style: italic;
    text-align: center;
    background: rgba(124,92,191,0.06);
    border: 0.5px solid var(--border-violet);
    border-radius: 18px;
    padding: 2.2rem;
    position: relative;
    overflow: hidden;
  }

  .synthese::before {
    content: '';
    position: absolute;
    top: 0;
    left: 10%;
    right: 10%;
    height: 0.5px;
    background: linear-gradient(to right, transparent, rgba(124,92,191,0.5), transparent);
  }

  .transit-card {
    background: rgba(255,255,255,0.02);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.7rem;
    align-items: start;
    border-left-width: 2px;
  }

  .transit-card[data-tonalite="harmonie"]    { border-left-color: #5b9a6e; }
  .transit-card[data-tonalite="tension"]     { border-left-color: #d4625a; }
  .transit-card[data-tonalite="friction"]    { border-left-color: #d4935a; }
  .transit-card[data-tonalite="fusion"]      { border-left-color: #c9a96e; }
  .transit-card[data-tonalite="opportunite"] { border-left-color: #5a8fd4; }

  .transit-planets {
    line-height: 1;
  }

  .transit-body {
    min-width: 0;
  }

  .transit-aspect-badge {
    display: inline-block;
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.42rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.18rem 0.55rem;
    border-radius: 20px;
    border: 0.5px solid currentColor;
    margin-bottom: 0.45rem;
  }

  [data-tonalite="harmonie"]    .transit-aspect-badge { color: #5b9a6e; }
  [data-tonalite="tension"]     .transit-aspect-badge { color: #d4625a; }
  [data-tonalite="friction"]    .transit-aspect-badge { color: #d4935a; }
  [data-tonalite="fusion"]      .transit-aspect-badge { color: #c9a96e; }
  [data-tonalite="opportunite"] .transit-aspect-badge { color: #5a8fd4; }

  .transit-text {
    font-size: 1rem;
    line-height: 1.65;
    color: #d4c9b8;
    font-style: italic;
  }

  .transit-orbe {
    font-size: 0.75rem;
    color: var(--text-muted);
    white-space: nowrap;
    padding-top: 0.2rem;
  }

  .moon-card {
    background: rgba(255,255,255,0.025);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  .moon-card .moon-info {
    min-width: 0;
  }

  .moon-card .moon-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.48rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 0.25rem;
  }

  .moon-card .moon-phase {
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 0.2rem;
  }

  .moon-card .moon-interp {
    font-size: 0.9rem;
    color: var(--text-dim);
    font-style: italic;
  }

  .oracle-reading {
    background: rgba(201,169,110,0.05);
    border: 0.5px solid rgba(201,169,110,0.22);
    border-radius: 14px;
    padding: 1.6rem 1.8rem;
    position: relative;
  }

  .oracle-reading::before {
    content: '';
    position: absolute;
    top: 0;
    left: 10%;
    right: 10%;
    height: 0.5px;
    background: linear-gradient(to right, transparent, rgba(201,169,110,0.4), transparent);
  }

  .oracle-reading-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.48rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 1rem;
    text-align: center;
  }

  .oracle-reading-text {
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--text);
    font-style: italic;
    text-align: center;
  }

  .oracle-error {
    font-size: 0.9rem;
    color: var(--text-dim);
    font-style: italic;
    text-align: center;
    margin-bottom: 1rem;
  }

  .btn-oracle-retry {
    display: block;
    width: 100%;
    padding: 0.65rem;
    background: transparent;
    border: 0.5px solid rgba(201,169,110,0.3);
    border-radius: 8px;
    color: var(--gold-dim);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-oracle-retry:hover {
    border-color: var(--gold-dim);
    background: rgba(201,169,110,0.06);
  }

  .btn-oracle-retry:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .notice {
    font-size: 0.82rem;
    color: var(--text-muted);
    font-style: italic;
    text-align: center;
    padding: 0.6rem 1rem;
    border: 0.5px solid rgba(201,169,110,0.12);
    border-radius: 8px;
    background: rgba(201,169,110,0.04);
    margin-bottom: 1.2rem;
  }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    padding: 2.5rem 1rem;
  }

  .orb {
    width: 64px;
    height: 64px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
  }

  .orb::before, .orb::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid;
  }

  .orb::before {
    border-color: rgba(201,169,110,0.4);
    animation: spin 5s linear infinite;
  }

  .orb::after {
    border-color: rgba(124,92,191,0.3);
    border-style: dashed; animation: spin 3s linear infinite reverse;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .loading-msg {
    font-style: italic;
    color: var(--text-dim);
    font-size: 1rem;
    animation: blink 1.8s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% {
      opacity: 0.4;
    }
    50% {
     opacity: 1;
    }
  }

  .error-box {
    background: rgba(226,75,74,0.08);
    border: 0.5px solid rgba(226,75,74,0.28);
    border-radius: 10px;
    padding: 1.2rem;
    color: #e24b4a;
    font-style: italic;
    font-size: 0.95rem;
    text-align: center;
    line-height: 1.6;
  }

  .btn-reset {
    display: block;
    width: 100%;
    padding: 0.75rem;
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 10px;
    color: var(--gold-dim);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.55rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-reset:hover {
    border-color: var(--gold-dim);
    background: rgba(201,169,110,0.06);
  }

  .footer {
    margin-top: 3rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    font-style: italic;
  }

  .profile-bar {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
  }

  #profile-select {
    flex: 1;
    padding: 0.7rem 1rem;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.3s, background 0.3s;
    -webkit-appearance: none;
    appearance: none;
  }

  #profile-select:focus {
    border-color: var(--gold-dim);
    background: rgba(201,169,110,0.06);
  }

  #profile-select option {
    background: #110d1f;
    color: var(--text);
  }

  .btn-profile {
    padding: 0.7rem 0.85rem;
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 10px;
    color: var(--gold-dim);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.5rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s;
  }

  .btn-profile:hover {
    border-color: var(--gold-dim);
    background: rgba(201,169,110,0.06);
  }

  .btn-profile-del {
    color: rgba(212,98,90,0.65);
    border-color: rgba(212,98,90,0.2);
  }

  .btn-profile-del:hover {
    border-color: rgba(212,98,90,0.5);
    background: rgba(212,98,90,0.06);
    color: #d4625a;
  }

  /* Synthèse skeleton pendant le chargement */
  .synthese-loading {
    height: 3.5rem;
    background: linear-gradient(90deg,
      rgba(124,92,191,0.06) 25%, rgba(124,92,191,0.14) 50%, rgba(124,92,191,0.06) 75%);
    background-size: 200% 100%;
    animation: skeleton-pulse 1.8s ease-in-out infinite;
    border-radius: 12px;
    margin-top: 2rem;
  }

  @keyframes skeleton-pulse {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .transit-collapsible > summary {
    list-style: none;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    padding: 0.5rem 0;
    user-select: none;
  }

  .transit-collapsible > summary::-webkit-details-marker {
    display: none;
  }

  .transit-collapsible .chevron {
    transition: transform 0.3s ease;
    flex-shrink: 0;
  }

  .transit-collapsible[open] .chevron {
    transform: rotate(90deg);
  }

  .astral-theme {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    margin-top: 1.5rem;
  }

  .transit-section {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .sigil-icon svg {
    display: block;
    margin: 0 auto;
  }

  .icon-moon {
    flex-shrink: 0;
  }

  .transit-planets {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    color: var(--text-dim);
    white-space: nowrap;
  }
</style>
</head>
<body>

<canvas id="canvas-stars"></canvas>
<div class="ambient"></div>

<!-- SVG sprite -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">

  <!-- Chevron (collapsible) -->
  <symbol id="icon-chevron" viewBox="0 0 24 24">
    <polyline points="9,6 15,12 9,18" stroke="#c9a96e" stroke-width="1.4" fill="none"
      stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- ── Planètes ── -->
  <symbol id="planet-sun" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="6.5" stroke="#c9a96e" stroke-width="1.2" fill="none"/>
    <circle cx="12" cy="12" r="2" fill="#c9a96e"/>
  </symbol>

  <symbol id="planet-moon" viewBox="0 0 24 24">
    <path d="M14 4 C9 5 6 8 6 12 C6 16 9 19 14 20 C10 19 8 16 8 12 C8 8 10 5 14 4Z"
      fill="#c9a96e" fill-opacity="0.85"/>
  </symbol>

  <symbol id="planet-mercury" viewBox="0 0 24 24">
    <circle cx="12" cy="13" r="4.5" stroke="#c9a96e" stroke-width="1.2" fill="none"/>
    <line x1="12" y1="17.5" x2="12" y2="21" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="9.5" y1="19" x2="14.5" y2="19" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M9 9.5 Q9 6 12 5.5 Q15 6 15 9.5" stroke="#c9a96e" stroke-width="1.2" fill="none"
      stroke-linecap="round"/>
  </symbol>

  <symbol id="planet-venus" viewBox="0 0 24 24">
    <circle cx="12" cy="10" r="5.5" stroke="#c9a96e" stroke-width="1.2" fill="none"/>
    <line x1="12" y1="15.5" x2="12" y2="21" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="9" y1="18" x2="15" y2="18" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round"/>
  </symbol>

  <symbol id="planet-mars" viewBox="0 0 24 24">
    <circle cx="10" cy="14" r="5.5" stroke="#c9a96e" stroke-width="1.2" fill="none"/>
    <line x1="14" y1="10" x2="20" y2="4" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round"/>
    <polyline points="14,4 20,4 20,10" stroke="#c9a96e" stroke-width="1.2" fill="none"

<script>

/* ── Canvas étoilé ── */
(function initStars() {
  const canvas = document.getElementById('canvas-stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createStars() {
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 8000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() < 0.1 ? 1.4 : Math.random() < 0.3 ? 0.9 : 0.5,
        phase: Math.random() * Math.PI * 2,
        speed: 0.4 + Math.random() * 1.2
      });
    }
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 0.01;
    for (const s of stars) {
      const alpha = 0.15 + 0.55 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); createStars(); });
  resize(); createStars(); draw();
})();

window.addEventListener('DOMContentLoaded', loadProfiles);

function getDateFr() {
  return new Date().toLocaleDateString('fr-FR',
    { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

/* ── Profils ── */
function loadProfiles() {
  const profiles = JSON.parse(localStorage.getItem('oracle_profiles') || '{}');
  const sel = document.getElementById('profile-select');
  const current = sel.value;
  sel.innerHTML = '<option value="">— Sélectionner un profil —</option>';
  Object.keys(profiles).sort().forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    if (name === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

function saveProfile() {
  const key = document.getElementById('prenom').value.trim();
  if (!key) return;
  const profiles = JSON.parse(localStorage.getItem('oracle_profiles') || '{}');
  profiles[key] = {
    prenom:          document.getElementById('prenom').value.trim(),
    dateNaissance:   document.getElementById('date-naissance').value,
    heureNaissance:  document.getElementById('heure-naissance').value,
    lieuNaissance:   document.getElementById('lieu-naissance').value.trim(),
  };
  localStorage.setItem('oracle_profiles', JSON.stringify(profiles));
  loadProfiles();
  document.getElementById('profile-select').value = key;
}

function loadSelectedProfile() {
  const key = document.getElementById('profile-select').value;
  if (!key) return;
  const profiles = JSON.parse(localStorage.getItem('oracle_profiles') || '{}');
  const p = profiles[key];
  if (!p) return;
  document.getElementById('prenom').value           = p.prenom || '';
  document.getElementById('date-naissance').value   = p.dateNaissance || '';
  document.getElementById('heure-naissance').value  = p.heureNaissance || '';
  document.getElementById('lieu-naissance').value   = p.lieuNaissance || '';
}

function deleteSelectedProfile() {
  const key = document.getElementById('profile-select').value;
  if (!key) return;
  if (!confirm(`Supprimer le profil « ${key} » ?`)) return;
  const profiles = JSON.parse(localStorage.getItem('oracle_profiles') || '{}');
  delete profiles[key];
  localStorage.setItem('oracle_profiles', JSON.stringify(profiles));
  loadProfiles();
}

/* ── Helpers ── */
function svgUse(id, cls, size) {
  const c = cls ? ` class="${cls}"` : '';
  const s = size || 24;
  return `<svg width="${s}" height="${s}"${c} aria-hidden="true"><use href="#${id}"/></svg>`;
}

/* ── Oracle ── */
let lastFormData = null;

function oracleCacheKey({ prenom, dateNaissance, lieuNaissance }) {
  const today = new Date().toISOString().slice(0, 10);
  return `oracle:${prenom}:${dateNaissance}:${lieuNaissance}:${today}`;
}

function oracleCacheGet(formData) {
  return localStorage.getItem(oracleCacheKey(formData)) || null;
}

function oracleCacheSave(formData, text) {
  localStorage.setItem(oracleCacheKey(formData), text);
}

async function consulterOracle() {
  const prenom          = document.getElementById('prenom').value.trim();
  const dateNaissance   = document.getElementById('date-naissance').value;
  const heureNaissance  = document.getElementById('heure-naissance').value || null;
  const lieuNaissance   = document.getElementById('lieu-naissance').value.trim();
  lastFormData = { prenom, dateNaissance, heureNaissance, lieuNaissance };

  if (!prenom || !dateNaissance || !lieuNaissance) {
    alert('Veuillez renseigner votre prénom, votre date de naissance et votre lieu de naissance.');
    return;
  }

  const btn = document.getElementById('btn-oracle');
  btn.disabled = true;

  document.getElementById('form-panel').style.display = 'none';
  const rp = document.getElementById('result-panel');
  rp.classList.add('show');

  document.getElementById('sigils-grid').innerHTML = '';
  document.getElementById('btn-reset').style.display = 'none';
  document.getElementById('synthese-container').innerHTML =
    '<div class="synthese synthese-loading"></div>';
  document.getElementById('transits-container').innerHTML = `
    <div class="prophecy-wrap">
      <div class="loading">
        <div class="orb"></div>
        <div class="loading-msg">Calcul du thème natal en cours…</div>
      </div>
    </div>
  `;

  try {
    const cachedOracle = oracleCacheGet(lastFormData);
    const res = await fetch('/api/horoscope', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prenom, dateNaissance, heureNaissance, lieuNaissance, skipOracle: !!cachedOracle })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.erreur || 'Erreur inconnue');
    if (cachedOracle) data.oracle = cachedOracle;
    renderHoroscope(data);
  } catch (e) {
    document.getElementById('synthese-container').innerHTML = '';
    document.getElementById('transits-container').innerHTML = `
      <div class="prophecy-wrap">
        <div class="error-box">
          Les astres sont troublés… L'Oracle ne peut se manifester.<br>
          <small style="opacity:0.65;font-size:0.85em">${e.message}</small>
        </div>
      </div>
    `;
  }

  btn.disabled = false;
}

function renderHoroscope(data) {
  const { natal, transits, lune, synthese, oracle } = data;

  // Sigils : Soleil natal | Lune natale | Ascendant
  const sigils = document.getElementById('sigils-grid');
  const ascNote = natal.heureInconnue ? '<div class="sigil-sub">~midi</div>' : '';
  sigils.innerHTML = `
    <div class="sigil">
      <span class="sigil-icon">${svgUse('sign-' + natal.soleil.signeKey, '', 32)}</span>
      <div class="sigil-label">Soleil natal</div>
      <div class="sigil-value">${natal.soleil.signe}</div>
      <div class="sigil-sub">${natal.soleil.degres}</div>
    </div>
    <div class="sigil">
      <span class="sigil-icon">${svgUse('sign-' + natal.lune.signeKey, '', 32)}</span>
      <div class="sigil-label">Lune natale</div>
      <div class="sigil-value">${natal.lune.signe}</div>
      <div class="sigil-sub">${natal.lune.degres}</div>
    </div>
    <div class="sigil">
      <span class="sigil-icon">${svgUse('sign-' + natal.ascendant.signeKey, '', 32)}</span>
      <div class="sigil-label">Ascendant</div>
      <div class="sigil-value">${natal.ascendant.signe}</div>
      ${ascNote || `<div class="sigil-sub">${natal.ascendant.degres}</div>`}
    </div>
  `;

  if (oracle) oracleCacheSave(lastFormData, oracle);
  renderOracleSection(oracle, data.oracleError, data.oracleRetryDelay);

  // Synthèse dans son propre bloc
  document.getElementById('synthese-container').innerHTML =
    `<div class="synthese">${synthese}</div>`;

  // Afficher le bouton reset
  document.getElementById('btn-reset').style.display = '';

  const noticeHtml = natal.heureInconnue
    ? `<div class="notice">Ascendant et maisons calculés pour midi — peu fiables sans heure exacte de naissance.</div>`
    : '';

  const moonHtml = `
    <div class="moon-card">
      ${svgUse('moon-' + lune.phaseKey, 'icon-moon', 40)}
      <div class="moon-info">
        <div class="moon-title">Lune du jour · ${Math.round(lune.illumination * 100)}% d'illumination</div>
        <div class="moon-phase">${lune.phase} en ${lune.signe}</div>
        <div class="moon-interp">${lune.interpretation}</div>
      </div>
    </div>
  `;

  const transitsInnerHtml = transits.length ? `
    <div class="transit-section">
      ${transits.map(t => `
        <div class="transit-card" data-tonalite="${t.tonalite}">
          <div class="transit-planets">
            ${svgUse('planet-' + t.planeteTransCle, '', 22)}→${svgUse('planet-' + t.planeteNataleCle, '', 22)}
          </div>
          <div class="transit-body">
            <span class="transit-aspect-badge">${t.aspectNom}</span>
            <div class="transit-text">${t.interpretation}</div>
          </div>
          <div class="transit-orbe">${t.orbe}°</div>
        </div>
      `).join('')}
    </div>
  ` : '';

  document.getElementById('transits-container').innerHTML = `
    <div class="prophecy-wrap">
      ${noticeHtml}
      <details class="transit-collapsible">
        <summary>${svgUse('icon-chevron', 'chevron', 16)} Thème astral (avancé)</summary>
        <div class="astral-theme">
          ${moonHtml}
          ${transitsInnerHtml}
        </div>
      </details>
    </div>
  `;
}

function renderOracleSection(oracle, oracleError, oracleRetryDelay) {
  const dateFr = getDateFr();
  const container = document.getElementById('oracle-container');
  if (oracle) {
    container.innerHTML = `
      <div class="oracle-reading">
        <div class="oracle-reading-label">✦ &nbsp; Parole de l'Oracle du ${dateFr} &nbsp; ✦</div>
        <div class="oracle-reading-text">${oracle}</div>
      </div>`;
  } else if (oracleError) {
    const delay = oracleRetryDelay ? ` dans ${oracleRetryDelay}` : ' plus tard';
    const msg = oracleError === 'rate_limit'
      ? `Trop de requêtes IA. Veuillez réessayer${delay}.`
      : 'La lecture oraculaire est indisponible pour le moment.';
    container.innerHTML = `
      <div class="oracle-reading">
        <div class="oracle-reading-label">✦ &nbsp; Parole de l'Oracle du ${dateFr} &nbsp; ✦</div>
        <div class="oracle-error">${msg}</div>
        <button class="btn-oracle-retry" onclick="retryOracle(this)">↻ &nbsp; Réessayer</button>
      </div>`;
  } else {
    container.innerHTML = '';
  }
}

async function retryOracle(btn) {
  if (!lastFormData) return;
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const res = await fetch('/api/oracle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(lastFormData)
    });
    const data = await res.json();
    if (data.oracle) oracleCacheSave(lastFormData, data.oracle);
    renderOracleSection(data.oracle, data.oracleError, data.oracleRetryDelay);
  } catch {
    btn.disabled = false;
    btn.textContent = '↻   Réessayer';
  }
}

function resetOracle() {
  document.getElementById('form-panel').style.display = 'block';
  document.getElementById('result-panel').classList.remove('show');
  setTimeout(() => {
    document.getElementById('result-panel').style.display = '';
  }, 10);
}
</script>
